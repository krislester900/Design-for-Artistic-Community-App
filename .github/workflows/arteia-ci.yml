name: Artéïa CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.x'

jobs:
  # ==========================================================
  # JOB 1 : TESTS FLUTTER (analyse + unitaires + coverage)
  # ==========================================================
  flutter-test:
    name: 🔬 Tests Flutter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: arteia_flutter

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: 🧪 Run unit tests (73 tests)
        run: flutter test --coverage --machine

      - name: 📊 Upload coverage
        uses: codecov/codecov-action@v3
        with:
          directory: arteia_flutter/coverage
          fail_ci_if_error: false

  # ==========================================================
  # JOB 2 : BUILD WEB (déploiement Vercel)
  # ==========================================================
  flutter-build-web:
    name: 🌐 Build Web
    needs: flutter-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: arteia_flutter

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔨 Build Web (release)
        run: flutter build web --release

      - name: 📤 Upload Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arteia-web
          path: arteia_flutter/build/web
          retention-days: 7

  # ==========================================================
  # JOB 3 : BUILD APK (Android SDK setup + build)
  # ==========================================================
  flutter-build-apk:
    name: 📱 Build APK (Android)
    needs: flutter-test
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: arteia_flutter

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17 (Android SDK requis)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          ANDROID_SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$ANDROID_SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK" >> $GITHUB_ENV
          $ANDROID_SDK/tools/bin/sdkmanager --install "platforms;android-36" "build-tools;36.0.0" "ndk;27.0.12077973" 2>&1 | tail -5 || true
          yes | $ANDROID_SDK/tools/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔨 Build APK (release, split per ABI)
        run: flutter build apk --release --split-per-abi --android-skip-build-dependency-validation

      - name: 📤 Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arteia-apk
          path: arteia_flutter/build/app/outputs/flutter-apk/*.apk
          retention-days: 7

  # ==========================================================
  # JOB 4 : MIGRATIONS SQL SUPABASE (23 schémas + seeds)
  # ==========================================================
  migrate-supabase:
    name: 🗄️ Migrations SQL
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Appliquer les 23 schémas (ordre chronologique)
        run: |
          echo "::group::📜 Exécution des schémas SQL"
          SCHEMAS=(
            "database/schema-safe.sql"
            "database/schema.sql"
            "database/schema-v2.sql"
            "database/schema-v3-features.sql"
            "database/schema-content.sql"
            "database/schema-likes-comments.sql"
            "database/schema-messaging.sql"
            "database/schema-messaging-update.sql"
            "database/schema-ai-assistant.sql"
            "database/schema-ai-training.sql"
            "database/schema-manga-styles.sql"
            "database/schema-manga-training.sql"
            "database/schema-web-sources.sql"
            "database/schema-pinterest-sources.sql"
            "database/schema-ontology.sql"
            "database/schema-stories.sql"
            "database/schema-fatmecoin.sql"
            "database/schema-donations-votes.sql"
            "database/schema-i18n-moderation.sql"
            "database/schema-collaborations.sql"
            "database/schema-music-studio.sql"
            "database/schema-migration-safe.sql"
            "database/schema-add-missing-tables.sql"
          )
          TOTAL=${#SCHEMAS[@]}
          OK=0
          SKIP=0
          FAIL=0
          for f in "${SCHEMAS[@]}"; do
            if [ -f "$f" ]; then
              echo "→ ($((OK+SKIP+FAIL+1))/$TOTAL) $f"
              if supabase db execute --file "$f" 2>/dev/null; then
                OK=$((OK+1))
                echo "   ✅ OK"
              else
                FAIL=$((FAIL+1))
                echo "   ⚠️ Déjà appliqué ou ignoré"
              fi
            else
              SKIP=$((SKIP+1))
              echo "⚠️ $f non trouvé, ignoré"
            fi
          done
          echo "📊 Résumé: $OK OK, $FAIL échecs, $SKIP ignorés sur $TOTAL"
          echo "::endgroup::"

      - name: Seed data (connaissances, styles manga, boards Pinterest)
        run: |
          echo "::group::🌱 Seed data"
          for seed in "database/seed-all.sql" "database/seed-pinterest-boards.sql" "database/seed-ontology-drawing.sql" "database/enable-auto-train.sql"; do
            echo "→ $seed"
            supabase db execute --file "$seed" 2>/dev/null && echo "   ✅ OK" || echo "   ⚠️ Déjà appliqué"
          done
          echo "::endgroup::"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ==========================================================
  # JOB 5 : DÉPLOIEMENT EDGE FUNCTIONS (7 fonctions)
  # ==========================================================
  deploy-supabase:
    name: ⚡ Deploy Edge Functions
    needs: migrate-supabase
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Déployer les 7 Edge Functions
        run: |
          echo "::group::⚡ Déploiement Edge Functions"
          FUNCTIONS=(
            "ai-assistant"
            "daily-learner --no-verify-jwt"
            "pinterest-collector --no-verify-jwt"
            "manga-trainer"
            "manga-generator"
            "create-payment-intent"
            "send-invitation-email"
          )
          for fn in "${FUNCTIONS[@]}"; do
            NAME=$(echo "$fn" | awk '{print $1}')
            echo "→ $NAME..."
            if supabase functions deploy $fn --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} 2>/dev/null; then
              echo "   ✅ $NAME déployée"
            else
              echo "   ⚠️ $NAME : erreur (peut-être already up-to-date)"
            fi
          done
          echo "::endgroup::"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Configurer les secrets des Edge Functions
        run: |
          echo "::group::🔑 Configuration des secrets"
          supabase secrets set --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            REPLICATE_API_KEY=${{ secrets.REPLICATE_API_KEY }} \
            CRON_SECRET=${{ secrets.CRON_SECRET }} \
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          echo "✅ Secrets configurés"
          echo "::endgroup::"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ==========================================================
  # JOB 6 : DÉPLOIEMENT WEB SUR VERCEL
  # ==========================================================
  deploy-web:
    name: 🚀 Deploy Web (Vercel)
    needs: flutter-build-web
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ==========================================================
  # JOB 7 : RELEASE GITHUB (uniquement commit "Release")
  # ==========================================================
  release:
    name: 🏷️ Create Release
    needs: [flutter-build-web, deploy-web, deploy-supabase]
    if: github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'Release')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release v${{ github.run_number }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## Artéïa Release v${{ github.run_number }}
            
            ### ✅ Tests & Validation
            - Tests Flutter (73+ unitaires)
            - Analyse statique Dart
            - 23 migrations SQL appliquées
            
            ### 🚀 Déploiement
            - 🌐 Flutter Web (Vercel)
            - ⚡ 7 Edge Functions Supabase
            - 📱 APK Android (build automatique)
            
            ### 🤖 IA & Entraînement
            - Arteïa Muse (assistant créatif)
            - Daily Learner (RAG quotidien)
            - LoRA Manga (SDXL via Replicate)
            - Pinterest Collector
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}