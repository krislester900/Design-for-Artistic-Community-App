name: 🌅 Apprentissage quotidien Arteïa Muse

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      run_manga_training:
        description: 'Lancer aussi l''entraînement manga LoRA'
        required: false
        default: false
        type: boolean

env:
  FUNCTIONS_URL: ${{ secrets.SUPABASE_EDGE_FUNCTIONS_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}

jobs:
  # ==========================================================
  # ÉTAPE 1 : Daily Learner (RSS → knowledge base)
  # ==========================================================
  daily-learner:
    name: 📡 1/2 Apprentissage RSS
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.run.outputs.status }}
    steps:
      - id: run
        run: |
          echo "::group::📡 Daily Learner"
          echo "Parsing des flux RSS artistiques..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$FUNCTIONS_URL/daily-learner" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json")
          BODY=$(echo "$RESPONSE" | head -n -1)
          CODE=$(echo "$RESPONSE" | tail -n 1)
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
          if [ "$CODE" = "200" ]; then
            echo "✅ Apprentissage quotidien terminé"
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Daily Learner a retourné HTTP $CODE"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi
          echo "::endgroup::"

  # ==========================================================
  # ÉTAPE 2 : Pinterest Collector (2min après daily-learner)
  # ==========================================================
  pinterest-collector:
    name: 📸 2/2 Collecte Pinterest
    needs: [daily-learner]
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.run.outputs.status }}
    steps:
      - name: Pause 2 minutes
        run: sleep 120
      - id: run
        run: |
          echo "::group::📸 Pinterest Collector"
          echo "Scraping des boards Pinterest configurés..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$FUNCTIONS_URL/pinterest-collector" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json")
          BODY=$(echo "$RESPONSE" | head -n -1)
          CODE=$(echo "$RESPONSE" | tail -n 1)
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
          if [ "$CODE" = "200" ]; then
            echo "✅ Collecte Pinterest terminée"
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Pinterest Collector a retourné HTTP $CODE"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi
          echo "::endgroup::"

  # ==========================================================
  # ÉTAPE 3 : Entraînement manga (2min après pinterest)
  # ==========================================================
  manga-training:
    name: 🤖 Entraînement manga LoRA auto
    if: github.event_name == 'workflow_dispatch' && inputs.run_manga_training == true
    needs: [pinterest-collector]
    runs-on: ubuntu-latest
    steps:
      - name: Pause 2 minutes
        run: sleep 120
      - name: Vérifier et lancer les entraînements prêts
        run: |
          echo "::group::🤖 Manga LoRA Auto-Train"
          echo "Vérification des styles avec ≥20 images prêtes à entraîner..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$FUNCTIONS_URL/manga-trainer" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d '{"action":"auto_train_ready"}')
          BODY=$(echo "$RESPONSE" | head -n -1)
          CODE=$(echo "$RESPONSE" | tail -n 1)
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
          if [ "$CODE" = "200" ]; then
            echo "✅ Vérification terminée"
          else
            echo "::error::Échec auto-train (HTTP $CODE)"
            exit 1
          fi
          echo "::endgroup::"
