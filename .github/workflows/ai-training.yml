name: Entraînement IA Arteïa Muse

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Type d'entraînement"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - daily-learner
          - manga-lora
          - assistant-export
      style_slug:
        description: "Slug du style manga (ex: tite-kubo) — laisse vide pour tous les styles ready"
        required: false
        default: ""
        type: string

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  FUNCTIONS_URL: ${{ secrets.SUPABASE_EDGE_FUNCTIONS_URL }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}
  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
  TIMEOUT_MINUTES: 120
  POLL_INTERVAL: 30
  TARGET: ${{ inputs.target }}
  STYLE_SLUG: ${{ inputs.style_slug }}

jobs:
  # ==========================================================
  # DÉCOUVERTE : liste les styles à entraîner
  # ==========================================================
  discover-styles:
    name: 🔍 Découverte des styles
    if: env.TARGET == 'manga-lora' || env.TARGET == 'all'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      count: ${{ steps.discover.outputs.count }}
    steps:
      - name: Lister les styles ready
        id: discover
        run: |
          echo "::group::🔍 Découverte des styles"
          if [ -n "$STYLE_SLUG" ]; then
            echo "Style spécifique: $STYLE_SLUG"
            echo "matrix={\"style_slug\":[\"$STYLE_SLUG\"]}" >> "$GITHUB_OUTPUT"
            echo "count=1" >> "$GITHUB_OUTPUT"
          else
            echo "Recherche de tous les styles 'ready'..."
            RESPONSE=$(curl -s "$SUPABASE_URL/rest/v1/ai_manga_styles?select=slug,name&training_status=eq.ready&order=name.asc" \
              -H "apikey: $SUPABASE_KEY" \
              -H "Authorization: Bearer $SUPABASE_KEY")
            SLUGS=$(echo "$RESPONSE" | jq -c '[.[].slug]')
            NAMES=$(echo "$RESPONSE" | jq -r '.[].name' | paste -sd, -)
            COUNT=$(echo "$RESPONSE" | jq 'length')
            echo "Styles trouvés: $COUNT ($NAMES)"
            echo "matrix={\"style_slug\":$SLUGS}" >> "$GITHUB_OUTPUT"
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          fi
          echo "::endgroup::"

  # ==========================================================
  # TRACK A : COLLECTE (RSS + Pinterest)
  # ==========================================================
  daily-learner:
    name: 📡 Apprentissage RSS
    if: env.TARGET == 'daily-learner' || env.TARGET == 'all'
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.run.outputs.status }}
    steps:
      - name: Parsing RSS → résumé IA → knowledge base
        id: run
        run: |
          echo "::group::📡 Daily Learner"
          echo "Parsing des flux RSS artistiques..."
          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$FUNCTIONS_URL/daily-learner" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")
          BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
          CODE=$(echo "$HTTP_RESPONSE" | tail -n 1)
          echo "HTTP $CODE"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
          if [ "$CODE" = "200" ]; then
            echo "✅ Apprentissage terminé"
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Daily Learner a retourné HTTP $CODE (non bloquant)"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi
          echo "::endgroup::"

  pinterest-collector:
    name: 📸 Collecte Pinterest
    if: env.TARGET == 'daily-learner' || env.TARGET == 'all'
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.run.outputs.status }}
      pins_count: ${{ steps.run.outputs.pins_count }}
    steps:
      - name: Scraping boards → nouvelles références
        id: run
        run: |
          echo "::group::📸 Pinterest Collector"
          echo "Scraping des boards Pinterest configurés..."
          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$FUNCTIONS_URL/pinterest-collector" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")
          BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
          CODE=$(echo "$HTTP_RESPONSE" | tail -n 1)
          echo "HTTP $CODE"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
          if [ "$CODE" = "200" ]; then
            PINS=$(echo "$BODY" | jq -r '.pins_collected // .new_pins // 0')
            echo "✅ Collecte terminée — $PINS nouveaux pins"
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "pins_count=$PINS" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Pinterest Collector a retourné HTTP $CODE (non bloquant)"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "pins_count=0" >> "$GITHUB_OUTPUT"
          fi
          echo "::endgroup::"

  # ==========================================================
  # TRACK B : ENTRAÎNEMENT MANGA LoRA (parallèle à la collecte)
  # ==========================================================
  manga-lora-training:
    name: 🤖 ${{ matrix.style_slug }}
    if: env.TARGET == 'manga-lora' || env.TARGET == 'all'
    needs: [discover-styles]
    strategy:
      matrix: ${{ fromJSON(needs.discover-styles.outputs.matrix) }}
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - name: Vérification du slug
        run: |
          if [ -z "${{ matrix.style_slug }}" ]; then
            echo "::error::Aucun style_slug trouvé."
            exit 1
          fi
          echo "Style: ${{ matrix.style_slug }}"

      - name: Lancement de l'entraînement LoRA
        id: launch
        run: |
          echo "::group::🚀 Lancement LoRA — ${{ matrix.style_slug }}"
          echo "Vérification du nombre d'images disponibles..."
          STATUS_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$FUNCTIONS_URL/manga-trainer" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"status\",\"style_slug\":\"${{ matrix.style_slug }}\"}")
          STATUS_BODY=$(echo "$STATUS_RESPONSE" | head -n -1)
          STATUS_CODE=$(echo "$STATUS_RESPONSE" | tail -n 1)
          if [ "$STATUS_CODE" = "200" ]; then
            REF_COUNT=$(echo "$STATUS_BODY" | jq -r '.reference_count // 0')
            echo "📊 Images de référence: $REF_COUNT"
            if [ "$REF_COUNT" -lt 5 ]; then
              echo "::warning::⚠️ Moins de 5 images disponibles. L'entraînement risque d'échouer."
            fi
          fi

          echo "Lancement de l'entraînement..."
          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$FUNCTIONS_URL/manga-trainer" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"start_training\",\"style_slug\":\"${{ matrix.style_slug }}\"}")
          BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
          CODE=$(echo "$HTTP_RESPONSE" | tail -n 1)
          echo "$BODY" | jq .
          if [ "$CODE" != "200" ]; then
            echo "::error::Échec lancement (HTTP $CODE)"
            exit 1
          fi
          JOB_ID=$(echo "$BODY" | jq -r '.job_id // empty')
          if [ -n "$JOB_ID" ]; then
            echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
            echo "✅ Job #$JOB_ID lancé"
          fi
          echo "::endgroup::"

      - name: Suivi progression (polling toutes les 30s, timeout 2h)
        id: poll
        if: steps.launch.outputs.job_id != ''
        run: |
          JOB_ID="${{ steps.launch.outputs.job_id }}"
          END_TIME=$(( $(date +%s) + TIMEOUT_MINUTES * 60 ))
          TRIES=0
          LORA_URL=""
          echo "::group::⏳ Suivi du job #$JOB_ID — ${{ matrix.style_slug }}"
          echo "Timeout: ${TIMEOUT_MINUTES}min | Intervalle: ${POLL_INTERVAL}s"
          while [ $(date +%s) -lt $END_TIME ]; do
            TRIES=$((TRIES + 1))
            RESULT=$(curl -s "$SUPABASE_URL/rest/v1/ai_training_jobs?id=eq.$JOB_ID&select=status,progress,error_message,replicate_job_id,created_at,started_at,completed_at,lora_url" \
              -H "apikey: $SUPABASE_KEY" \
              -H "Authorization: Bearer $SUPABASE_KEY")
            STATUS=$(echo "$RESULT" | jq -r '.[0].status // "unknown"')
            PROGRESS=$(echo "$RESULT" | jq -r '.[0].progress // 0')
            ERROR=$(echo "$RESULT" | jq -r '.[0].error_message // ""')
            LORA_URL=$(echo "$RESULT" | jq -r '.[0].lora_url // ""')
            PROGRESS_PCT=$(awk "BEGIN {printf \"%.0f\", $PROGRESS * 100}")
            TIMESTAMP=$(date +%H:%M:%S)

            case "$STATUS" in
              "completed")
                echo "✅ [$TIMESTAMP] Entraînement terminé ! (100%)"
                echo "🎯 Modèle LoRA: $LORA_URL"
                echo "::endgroup::"
                exit 0
                ;;
              "failed")
                echo "::error::[$TIMESTAMP] Échec : $ERROR"
                echo "::endgroup::"
                exit 1
                ;;
              "preparing")
                echo "📦 [$TIMESTAMP] Préparation du dataset..."
                ;;
              "training")
                echo "🔄 [$TIMESTAMP] Entraînement en cours — ${PROGRESS_PCT}% (tentative $TRIES)"
                ;;
              *)
                echo "⏸️  [$TIMESTAMP] Statut: $STATUS (${PROGRESS_PCT}%)"
                ;;
            esac
            sleep $POLL_INTERVAL
          done
          echo "::error::Timeout dépassé (${TIMEOUT_MINUTES}min). Vérifier le statut manuellement."
          echo "::endgroup::"
          exit 1

      - name: Enregistrer l'artifact LoRA
        if: always()
        run: |
          mkdir -p artifacts/lora
          cat > "artifacts/lora/${{ matrix.style_slug }}.json" << EOF
          {
            "style_slug": "${{ matrix.style_slug }}",
            "status": "${{ steps.poll.outputs.status }}",
            "lora_url": "${{ steps.poll.outputs.lora_url }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          echo "📝 Artifact sauvegardé: artifacts/lora/${{ matrix.style_slug }}.json"

      - name: Upload artifact LoRA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lora-${{ matrix.style_slug }}
          path: artifacts/lora/${{ matrix.style_slug }}.json
          retention-days: 30

  # ==========================================================
  # TRACK B (suite) : EXPORT FINE-TUNING
  # ==========================================================
  assistant-export:
    name: 📊 Export fine-tuning
    if: env.TARGET == 'assistant-export' || env.TARGET == 'all'
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.run.outputs.status }}
    steps:
      - name: Export conversations → JSONL
        id: run
        run: |
          echo "::group::📊 Export Training Data"
          echo "Export des conversations au format JSONL..."
          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$FUNCTIONS_URL/ai-assistant" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d '{"action":"export_training_data","format":"jsonl"}')
          BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
          CODE=$(echo "$HTTP_RESPONSE" | tail -n 1)
          echo "HTTP $CODE"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
          if [ "$CODE" = "200" ]; then
            echo "✅ Export terminé"
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Export échoué (HTTP $CODE)"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "::endgroup::"

      - name: Enregistrer métadonnées d'export
        if: always()
        run: |
          mkdir -p artifacts/export
          cat > artifacts/export/result.json << EOF
          {
            "status": "${{ steps.run.outputs.status }}",
            "target": "$TARGET",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload artifact export
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assistant-export
          path: artifacts/export/
          retention-days: 30

  # ==========================================================
  # RAPPORT + NOTIFICATION
  # ==========================================================
  summary:
    name: 📋 Rapport
    if: always()
    needs:
      - discover-styles
      - daily-learner
      - pinterest-collector
      - manga-lora-training
      - assistant-export
    runs-on: ubuntu-latest
    steps:
      - name: Génération du rapport
        id: report
        run: |
          echo "::group::📋 RAPPORT D'ENTRAÎNEMENT"
          echo "Cible: $TARGET"
          echo "Style(s): ${STYLE_SLUG:-tous les styles ready}"
          echo ""

          DL_STATUS="${{ needs.daily-learner.outputs.status }}"
          PC_STATUS="${{ needs.pinterest-collector.outputs.status }}"
          PC_PINS="${{ needs.pinterest-collector.outputs.pins_count }}"
          AE_STATUS="${{ needs.assistant-export.outputs.status }}"
          STYLE_COUNT="${{ needs.discover-styles.outputs.count }}"

          echo "┌──────────────────────────────┬──────────────┐"
          printf "│ %-28s │ %-12s │\n" "📡 Daily Learner" "${DL_STATUS:-N/A}"
          printf "│ %-28s │ %-12s │\n" "📸 Pinterest" "${PC_STATUS:-N/A}"
          if [ -n "$PC_PINS" ] && [ "$PC_PINS" != "0" ] && [ "$PC_PINS" != "" ]; then
            printf "│ %-28s │ %-12s │\n" "   └ Pins" "$PC_PINS"
          fi
          printf "│ %-28s │ %-12s │\n" "🤖 Styles LoRA" "${STYLE_COUNT:-N/A}"
          printf "│ %-28s │ %-12s │\n" "📊 Export" "${AE_STATUS:-N/A}"
          echo "└──────────────────────────────┴──────────────┘"

          echo ""
          echo "📁 Artifacts disponibles dans l'onglet Summary ↑"
          echo "::endgroup::"

      - name: Enregistrer le rapport global
        run: |
          mkdir -p artifacts/report
          cat > artifacts/report/report.json << EOF
          {
            "target": "$TARGET",
            "style_slug": "$STYLE_SLUG",
            "style_count": "${{ needs.discover-styles.outputs.count }}",
            "daily_learner": "${{ needs.daily-learner.outputs.status }}",
            "pinterest": "${{ needs.pinterest-collector.outputs.status }}",
            "pins": "${{ needs.pinterest-collector.outputs.pins_count }}",
            "assistant_export": "${{ needs.assistant-export.outputs.status }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload artifact rapport
        uses: actions/upload-artifact@v4
        with:
          name: training-report
          path: artifacts/report/
          retention-days: 90

      - name: Notification Discord
        if: always() && env.DISCORD_WEBHOOK != ''
        run: |
          DL_STATUS="${{ needs.daily-learner.outputs.status }}"
          PC_STATUS="${{ needs.pinterest-collector.outputs.status }}"
          AE_STATUS="${{ needs.assistant-export.outputs.status }}"

          HAS_FAILURE=false
          [ "$DL_STATUS" = "failed" ] && HAS_FAILURE=true
          [ "$PC_STATUS" = "failed" ] && HAS_FAILURE=true
          [ "$AE_STATUS" = "failed" ] && HAS_FAILURE=true

          if [ "$HAS_FAILURE" = "true" ]; then
            COLOR=15158332
            MSG="❌ Certains jobs ont échoué"
          else
            COLOR=5814783
            MSG="✅ Tout est OK"
          fi

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"Entraînement IA Arteïa Muse\",
                \"description\": \"${MSG}\",
                \"color\": ${COLOR},
                \"fields\": [
                  {\"name\": \"Cible\", \"value\": \"$TARGET\", \"inline\": true},
                  {\"name\": \"Daily Learner\", \"value\": \"${DL_STATUS:-N/A}\", \"inline\": true},
                  {\"name\": \"Pinterest\", \"value\": \"${PC_STATUS:-N/A}\", \"inline\": true},
                  {\"name\": \"Export\", \"value\": \"${AE_STATUS:-N/A}\", \"inline\": true}
                ],
                \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }]
            }"