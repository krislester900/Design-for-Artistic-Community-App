name: arteia_app
description: Artéïa - Communauté artistique
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.0
  supabase_flutter: ^2.9.1
  cached_network_image: ^3.4.0
  provider: ^6.1.5
  image_picker: ^1.1.2
  file_picker: ^6.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  intl: ^0.19.0
  timeago: ^3.7.0
  fluttertoast: ^8.2.8
  uuid: ^4.5.1
  mime: ^2.0.0
  http: ^1.2.0
  just_audio: ^0.9.36
  audioplayers: ^6.0.0
  record: ^5.0.0
  permission_handler: ^11.0.0

dependency_overrides:
  app_links: 6.1.0
  lottie: ^3.2.0
  shimmer: ^3.0.0
  rive: ^0.13.20
  flutter_native_splash: ^2.4.4
  http: ^1.6.0
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  timeago: ^3.7.0
  fluttertoast: ^8.2.8
  uuid: ^4.5.1
  mime: ^2.0.0
  record_platform_interface: 1.6.0
  record_web: 1.1.9
  record: 5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.jpeg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
    - assets/icons/
    - assets/fonts/
