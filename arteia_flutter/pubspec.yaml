name: arteia_app
description: Artéïa - Communauté artistique
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.0
  supabase_flutter: ^2.9.1
  webview_flutter: ^4.8.0
  webview_flutter_web: ^0.2.3
  cached_network_image: ^3.4.0
  provider: ^6.1.5
  image_picker: ^1.1.2
  file_picker: ^8.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  intl: ^0.19.0
  timeago: ^3.7.0

  uuid: ^4.5.1
  mime: ^2.0.0
  http: ^1.2.0
  just_audio: ^0.9.36
  audioplayers: ^6.0.0
  record: ^7.1.0
  permission_handler: ^11.0.0
  rive: ^0.14.9
  flutter_dotenv: ^5.1.0
  flutter_contacts: ^1.1.7
  app_links: ^7.2.0
  youtube_player_iframe: ^6.0.2

dependency_overrides:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.jpeg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
    - assets/images/covers/
    - assets/icons/
    - assets/fonts/
    - assets/games/shader_pilot/
    - assets/games/shader_pilot/assets/
    - assets/games/sky_metropolis/
    - assets/games/sky_metropolis/assets/
    - assets/games/voxel_art/
    - assets/games/voxel_art/assets/
    - assets/games/vynora/
    - assets/games/vynora/assets/
    - assets/games/simple_card_stack/
    - assets/games/simple_card_stack/assets/
    - assets/vynora_playlist/
    - assets/.env
